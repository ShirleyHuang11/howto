<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" font-family="sans-serif" font-size="13">
  <rect width="640" height="260" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Fare gate: tap, wait for green, walk through</text>

  <!-- gate body -->
  <rect x="60" y="60" width="90" height="150" rx="8" fill="#e8e8e8" stroke="#555"/>
  <rect x="330" y="60" width="90" height="150" rx="8" fill="#e8e8e8" stroke="#555"/>

  <!-- card reader -->
  <rect x="95" y="75" width="40" height="28" rx="4" fill="#ffd54d" stroke="#555"/>
  <text x="115" y="93" text-anchor="middle" font-size="10">TAP</text>
  <text x="115" y="125" text-anchor="middle" font-size="10" fill="#333">reader</text>

  <!-- indicator -->
  <circle cx="375" cy="90" r="12" fill="#4caf50" stroke="#555"/>
  <text x="375" y="120" text-anchor="middle" font-size="10" fill="#333">green =</text>
  <text x="375" y="133" text-anchor="middle" font-size="10" fill="#333">open</text>

  <!-- gate paddles -->
  <path d="M150 120 Q 190 135 150 190" fill="none" stroke="#888" stroke-width="6" stroke-linecap="round"/>
  <path d="M330 120 Q 290 135 330 190" fill="none" stroke="#888" stroke-width="6" stroke-linecap="round"/>

  <!-- walk arrow -->
  <line x1="180" y1="155" x2="290" y2="155" stroke="#1976d2" stroke-width="5" stroke-dasharray="10 6"/>
  <polygon points="290,145 310,155 290,165" fill="#1976d2"/>

  <!-- sequence -->
  <text x="470" y="80" fill="#1a1a1a" font-weight="bold">1. Tap card or phone on the reader</text>
  <text x="470" y="105" fill="#1a1a1a" font-weight="bold">2. Wait for the green light</text>
  <text x="470" y="130" fill="#1a1a1a" font-weight="bold">3. Walk through without stopping</text>
  <text x="470" y="165" fill="#b71c1c">Rejected (red)? Step aside,</text>
  <text x="470" y="182" fill="#b71c1c">try the next gate or ask staff.</text>
  <text x="470" y="215" fill="#555" font-size="11">Distance-fare systems: keep the</text>
  <text x="470" y="230" fill="#555" font-size="11">card ready to tap out at exit.</text>
</svg>
