<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="sans-serif" font-size="13">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Dishwasher loading zones (side view)</text>

  <!-- machine outline -->
  <rect x="60" y="45" width="360" height="230" rx="10" fill="none" stroke="#555" stroke-width="2"/>

  <!-- top rack -->
  <line x1="75" y1="130" x2="405" y2="130" stroke="#888" stroke-width="4"/>
  <g stroke="#1976d2" stroke-width="2" fill="none">
    <path d="M110 128 a14 14 0 0 1 24 0"/>
    <path d="M150 128 a14 14 0 0 1 24 0"/>
    <path d="M190 128 a14 14 0 0 1 24 0"/>
    <ellipse cx="270" cy="122" rx="20" ry="8"/>
    <ellipse cx="330" cy="122" rx="20" ry="8"/>
  </g>
  <text x="430" y="105" fill="#1976d2" font-weight="bold">TOP: cups &amp; glasses</text>
  <text x="430" y="122" fill="#1976d2">face-down, at an angle,</text>
  <text x="430" y="139" fill="#1976d2">not touching each other</text>

  <!-- bottom rack -->
  <line x1="75" y1="245" x2="405" y2="245" stroke="#888" stroke-width="4"/>
  <g stroke="#2e7d32" stroke-width="2" fill="none">
    <ellipse cx="110" cy="225" rx="7" ry="22"/>
    <ellipse cx="135" cy="225" rx="7" ry="22"/>
    <ellipse cx="160" cy="225" rx="7" ry="22"/>
    <rect x="200" y="205" width="55" height="40" rx="6"/>
  </g>
  <!-- cutlery basket -->
  <rect x="290" y="210" width="60" height="35" rx="4" fill="none" stroke="#e65100" stroke-width="2"/>
  <line x1="300" y1="210" x2="300" y2="200" stroke="#e65100" stroke-width="2"/>
  <line x1="315" y1="210" x2="315" y2="198" stroke="#e65100" stroke-width="2"/>
  <line x1="330" y1="210" x2="330" y2="201" stroke="#e65100" stroke-width="2"/>
  <text x="430" y="205" fill="#2e7d32" font-weight="bold">BOTTOM: plates vertical,</text>
  <text x="430" y="222" fill="#2e7d32">faces to center; pots face-down</text>
  <text x="430" y="245" fill="#e65100" font-weight="bold">Cutlery: handles down.</text>
  <text x="430" y="262" fill="#b71c1c" font-weight="bold">Knives: handles UP ⚠</text>

  <!-- spray arm -->
  <line x1="150" y1="262" x2="330" y2="262" stroke="#555" stroke-width="3"/>
  <circle cx="240" cy="262" r="5" fill="#555"/>
  <text x="240" y="290" text-anchor="middle" fill="#555" font-size="11">spray arm must spin freely: check before closing</text>
</svg>
